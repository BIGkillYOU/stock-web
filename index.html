<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Prompt', sans-serif;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

/* Input */
.input-group {
  margin-bottom: 15px;
  text-align: left;
}

label {
  font-size: 14px;
  color: #555;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 5px;
  font-size: 16px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #4facfe;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00c6ff;
}

/* Result */
.result {
  margin-top: 15px;
  font-size: 14px;
}

/* Auto fill box */
.info-box {
  background: #f1f7ff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
  text-align: left;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📦 Stock Manager</h2>

  <div class="input-group">
    <label>P/N</label>
    <input type="text" id="pn" oninput="fillData()">
  </div>

  <div class="info-box" id="infoBox">
    🔍 รอกรอก P/N
  </div>

  <div class="input-group">
    <label>S/N</label>
    <input type="text" id="sn">
  </div>

  <button onclick="sendData()">บันทึกข้อมูล</button>

  <div class="result" id="result"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxcEJXO20Zs5YZ2EfgV00L1ehnSCwgdahbSOWb-xm6NrqBTU5uM8hvoGqpTGsqppihV/exec";

// 🔹 Database ตัวอย่าง
const itemData = {
  "ABC123": { item: "Keyboard", brand: "Logitech", model: "K120" },
  "XYZ789": { item: "Mouse", brand: "Razer", model: "DeathAdder" }
};

// 🔹 Autofill
function fillData() {
  const pn = document.getElementById("pn").value;
  const infoBox = document.getElementById("infoBox");

  if (itemData[pn]) {
    const data = itemData[pn];
    infoBox.innerHTML = `
      <b>Item:</b> ${data.item}<br>
      <b>Brand:</b> ${data.brand}<br>
      <b>Model:</b> ${data.model}
    `;
  } else {
    infoBox.innerHTML = "❌ ไม่พบข้อมูล";
  }
}

// 🔹 ส่งข้อมูล
async function sendData() {
  const pn = document.getElementById("pn").value;
  const sn = document.getElementById("sn").value;
  const resultBox = document.getElementById("result");

  if (!itemData[pn]) {
    resultBox.innerHTML = "❌ กรุณาใส่ P/N ให้ถูกต้อง";
    return;
  }

  if (!sn) {
    resultBox.innerHTML = "❌ กรุณาใส่ S/N";
    return;
  }

  const data = {
    pn: pn,
    sn: sn,
    item: itemData[pn].item,
    brand: itemData[pn].brand,
    model: itemData[pn].model
  };

  resultBox.innerHTML = "⏳ กำลังบันทึก...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();

    resultBox.innerHTML = "✅ บันทึกสำเร็จ!";
    document.getElementById("sn").value = "";

  } catch (err) {
    resultBox.innerHTML = "❌ เกิดข้อผิดพลาด";
  }
}
</script>

</body>
</html>
